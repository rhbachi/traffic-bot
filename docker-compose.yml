services:
  trafficbot:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - DATABASE_PATH=/data/traffic_bot.db
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
    volumes:
      - trafficbot_data:/data
    tmpfs:
      - /tmp:size=512m,mode=1777
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  trafficbot_data:
    driver: local
