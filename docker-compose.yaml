services:
  trafficbot:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - DATABASE_PATH=/data/traffic_bot.db
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
    volumes:
      - trafficbot_data:/data
    restart: unless-stopped

volumes:
  trafficbot_data:
    driver: local
